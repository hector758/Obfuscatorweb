<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MortyHub Elite V3 | Ultra Obfuscator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(#112211 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .glass {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00ff4133;
        }

        .neon-border:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px #00ff41;
            background-color: #00ff41;
            color: #000;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-4xl flex flex-col items-center mb-8 animate-pulse">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tighter mb-2 text-white">
            MORTYHUB <span class="text-green-500">V3</span>
        </h1>
        <p class="text-gray-500 text-sm uppercase tracking-[0.4em]">HEXADECIMAL_VIRTUAL_MACHINE</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Input -->
        <section class="glass p-6 rounded-xl flex flex-col border-t-2 border-green-500">
            <h2 class="text-xl font-semibold mb-4 flex items-center text-white">
                <i class="fas fa-terminal mr-2 text-green-500"></i> SOURCE_CODE
            </h2>
            <textarea 
                id="inputCode" 
                placeholder="Pegue su script de Roblox aquí..." 
                class="w-full h-80 bg-black text-green-400 p-4 rounded border border-gray-800 neon-border resize-none text-sm"
            ></textarea>
            <button 
                onclick="processObfuscation()"
                class="mt-6 w-full py-4 glass text-green-400 font-bold rounded-lg transition-all duration-300 btn-glow uppercase tracking-widest"
            >
                VIRTUALIZE SCRIPT
            </button>
        </section>

        <!-- Output -->
        <section class="glass p-6 rounded-xl flex flex-col border-t-2 border-green-500">
            <div class="flex items-center justify-between mb-4 text-white">
                <h2 class="text-xl font-semibold flex items-center">
                    <i class="fas fa-microchip mr-2 text-green-500"></i> ENCRYPTED_OUTPUT
                </h2>
                <button onclick="copyOutput()" id="copyBtn" class="text-xs bg-green-900 text-green-400 px-3 py-1 rounded hover:bg-green-400 hover:text-black font-bold transition-all">
                    COPY
                </button>
            </div>
            <textarea 
                id="outputCode" 
                readonly 
                placeholder="El script protegido aparecerá aquí..." 
                class="w-full h-80 bg-black text-white p-4 rounded border border-gray-800 resize-none text-[10px] font-mono"
            ></textarea>
            <div id="status" class="mt-6 text-center text-[10px] text-gray-500 uppercase tracking-widest">
                ESTADO: ESPERANDO_ORDENES
            </div>
        </section>

    </main>

    <footer class="mt-12 w-full max-w-4xl grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
        <div class="glass p-4 rounded-lg">
            <i class="fas fa-biohazard text-green-500 text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-white">HEX_VM</h3>
            <p class="text-[9px] text-gray-500">Indescifrable para humanos</p>
        </div>
        <div class="glass p-4 rounded-lg">
            <i class="fas fa-user-ninja text-green-500 text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-white">STEALTH_MODE</h3>
            <p class="text-[9px] text-gray-500">Bypass de detección simple</p>
        </div>
        <div class="glass p-4 rounded-lg">
            <i class="fas fa-shield-virus text-green-500 text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-white">ELITE_SEC</h3>
            <p class="text-[9px] text-gray-500">Protección de integridad</p>
        </div>
    </footer>

    <script>
        // Convertir String a Hexadecimal (Más estable que Base64)
        function toHex(str) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                result += str.charCodeAt(i).toString(16).padStart(2, '0');
            }
            return result;
        }

        function processObfuscation() {
            const script = document.getElementById('inputCode').value;
            const output = document.getElementById('outputCode');
            const status = document.getElementById('status');

            if (!script.trim()) {
                status.innerHTML = "<span class='text-red-500'>ERROR: SIN_DATOS</span>";
                return;
            }

            status.innerHTML = "<span class='text-white animate-pulse'>VIRTUALIZANDO_VM...</span>";
            
            setTimeout(() => {
                const hexData = toHex(script);
                const rName = (l) => Array.from({length: l}, () => "lI1"[Math.floor(Math.random()*3)]).join('');
                
                // Nombres de variables ultra confusos
                const v_decoder = rName(25);
                const v_data = rName(22);
                const v_runner = rName(20);
                const v_hex = rName(18);

                const protected = `--[[ 🛡️ MORTYHUB ELITE V3 (HEX-VM EDITION) ]]
local ${v_data} = "${hexData}"
local function ${v_decoder}(${v_hex})
    local result = ""
    for i = 1, #${v_hex}, 2 do
        local byte = string.sub(${v_hex}, i, i + 1)
        result = result .. string.char(tonumber(byte, 16))
    end
    return result
end

local ${v_runner} = loadstring(${v_decoder}(${v_data}))
if ${v_runner} then
    spawn(function()
        ${v_runner}()
    end)
else
    warn("MORTYHUB_CRITICAL_ERROR: VM_FAILED")
end`;
                
                output.value = protected;
                status.innerHTML = "<span class='text-green-400'>PROTECCIÓN_V3_EXITOSA</span>";
            }, 600);
        }

        function copyOutput() {
            const out = document.getElementById("outputCode");
            const btn = document.getElementById("copyBtn");
            if(!out.value) return;
            out.select();
            document.execCommand("copy");
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY", 2000);
        }
    </script>
</body>
</html>
