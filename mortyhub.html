<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MortyHub – Lua Obfuscator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-cyan:   #00ffe7;
      --neon-purple: #bf00ff;
      --neon-pink:   #ff00a8;
      --dark:        #030610;
      --panel:       rgba(0,255,231,0.04);
      --border:      rgba(0,255,231,0.18);
      --text:        #c8fff9;
    }

    /* ── FONDO ANIMADO ── */
    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* Grid perspectiva */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        linear-gradient(rgba(0,255,231,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridMove { to { background-position: 0 40px, 40px 0; } }

    /* Nebula blobs */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(191,0,255,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 75%, rgba(0,255,231,.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255,0,168,.10) 0%, transparent 70%);
      animation: blobShift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes blobShift {
      0%   { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.08) rotate(3deg); }
    }

    /* Scanlines */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.15) 2px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── LAYOUT ── */
    .container {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── HEADER ── */
    header { text-align: center; margin-bottom: 48px; }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 60%, var(--neon-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,255,231,.55));
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 18px rgba(0,255,231,.55)); }
      50%      { filter: drop-shadow(0 0 36px rgba(191,0,255,.8)) drop-shadow(0 0 60px rgba(0,255,231,.3)); }
    }

    .tagline {
      margin-top: 10px;
      font-size: .85rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--neon-purple);
      opacity: .8;
    }

    /* decorative line */
    .divider {
      margin: 20px auto 0;
      width: 260px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
      border-radius: 2px;
    }

    /* ── PANEL ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 40px rgba(0,255,231,.06), inset 0 0 20px rgba(0,255,231,.03);
      position: relative;
    }
    .panel + .panel { margin-top: 20px; }

    /* corner decorations */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--neon-cyan);
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 12px 0 0 0; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 12px 0; }

    .panel-label {
      font-family: 'Orbitron', sans-serif;
      font-size: .7rem;
      letter-spacing: .25em;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: .75;
    }

    /* ── TEXTAREA ── */
    textarea {
      width: 100%;
      min-height: 220px;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(0,255,231,.2);
      border-radius: 8px;
      color: #a0ffee;
      font-family: 'Share Tech Mono', monospace;
      font-size: .88rem;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      caret-color: var(--neon-cyan);
    }
    textarea:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 16px rgba(0,255,231,.18);
    }
    textarea::placeholder { color: rgba(0,255,231,.25); }

    /* ── OPCIONES ── */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .opt-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(0,255,231,.12);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .opt-item:hover { border-color: rgba(0,255,231,.4); background: rgba(0,255,231,.06); }

    .opt-item input[type=checkbox] { display: none; }
    .check-box {
      width: 16px; height: 16px;
      border: 2px solid var(--neon-cyan);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .opt-item input:checked + .check-box {
      background: var(--neon-cyan);
    }
    .opt-item input:checked + .check-box::after {
      content: '✓';
      font-size: .7rem;
      color: #000;
      font-weight: 900;
    }
    .opt-label { font-size: .8rem; color: var(--text); letter-spacing: .05em; }

    /* intensity slider */
    .intensity-row {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 24px;
    }
    .intensity-row label {
      font-size: .75rem;
      letter-spacing: .15em;
      color: var(--neon-cyan);
      text-transform: uppercase;
      white-space: nowrap;
    }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: linear-gradient(90deg, var(--neon-cyan) var(--val, 70%), rgba(0,255,231,.15) 0);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan);
      border: 3px solid #000;
    }
    .intensity-val {
      font-family: 'Orbitron', sans-serif;
      font-size: .85rem;
      color: var(--neon-cyan);
      min-width: 30px;
      text-align: right;
    }

    /* ── BOTONES ── */
    .btn-row { display: flex; gap: 14px; flex-wrap: wrap; }

    .btn {
      font-family: 'Orbitron', sans-serif;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
    }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, #00ffe7, #00b8ff);
      color: #000;
      flex: 1;
      box-shadow: 0 0 24px rgba(0,255,231,.4);
    }
    .btn-primary:hover { box-shadow: 0 0 40px rgba(0,255,231,.65); }

    .btn-secondary {
      background: transparent;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      box-shadow: inset 0 0 12px rgba(0,255,231,.08);
    }
    .btn-secondary:hover { background: rgba(0,255,231,.08); box-shadow: 0 0 18px rgba(0,255,231,.25); }

    .btn-danger {
      background: transparent;
      color: var(--neon-pink);
      border: 1px solid var(--neon-pink);
    }
    .btn-danger:hover { background: rgba(255,0,168,.08); }

    /* ripple */
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,.3) 0%, transparent 70%);
      opacity: 0; transform: scale(0);
      transition: opacity .4s, transform .4s;
    }
    .btn:active::after { opacity: 1; transform: scale(2); transition: none; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; gap: 18px; flex-wrap: wrap;
      font-size: .72rem;
      letter-spacing: .12em;
      color: rgba(0,255,231,.5);
      margin-top: 12px;
    }
    .stats-bar span { transition: color .3s; }
    .stats-bar span.active { color: var(--neon-cyan); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,.85);
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: .72rem;
      letter-spacing: .15em;
      padding: 12px 28px;
      border-radius: 40px;
      box-shadow: 0 0 30px rgba(0,255,231,.3);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: .7rem;
      letter-spacing: .2em;
      color: rgba(0,255,231,.2);
      text-transform: uppercase;
    }
    footer span { color: var(--neon-purple); opacity: .6; }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <div class="container">
    <!-- HEADER -->
    <header>
      <div class="logo">MortyHub</div>
      <div class="tagline">Lua Obfuscator &nbsp;//&nbsp; Script Protection Engine</div>
      <div class="divider"></div>
    </header>

    <!-- INPUT -->
    <div class="panel">
      <div class="panel-label">▸ INPUT — Script Lua</div>
      <textarea id="inputCode" placeholder="-- Pega tu script Lua aquí...
local function hola()
  print('Hello from MortyHub!')
end
hola()"></textarea>
      <div class="stats-bar" id="statsIn">
        <span id="statLines">0 líneas</span>
        <span id="statChars">0 caracteres</span>
        <span id="statFuncs">0 funciones</span>
      </div>
    </div>

    <!-- OPCIONES -->
    <div class="panel">
      <div class="panel-label">▸ OPCIONES DE OFUSCACIÓN</div>

      <div class="options-grid">
        <label class="opt-item">
          <input type="checkbox" id="optVars" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Renombrar variables</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optStrings" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Codificar strings</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optNumbers" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Ofuscar números</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optComments" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Eliminar comentarios</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optJunk" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Insertar código basura</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optMinify" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Minificar código</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optWrap" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Envolver en función</span>
        </label>
        <label class="opt-item">
          <input type="checkbox" id="optHex" checked/>
          <span class="check-box"></span>
          <span class="opt-label">Hex encode strings</span>
        </label>
      </div>

      <div class="intensity-row">
        <label>Intensidad</label>
        <input type="range" id="intensity" min="1" max="5" value="3"
               style="--val:60%" oninput="updateIntensity(this)"/>
        <div class="intensity-val" id="intensityVal">3</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="obfuscate()">⚡ OFUSCAR AHORA</button>
        <button class="btn btn-secondary" onclick="copyOutput()">⎘ COPIAR</button>
        <button class="btn btn-danger" onclick="clearAll()">✕ LIMPIAR</button>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel">
      <div class="panel-label">▸ OUTPUT — Script Ofuscado</div>
      <textarea id="outputCode" readonly placeholder="// El resultado aparecerá aquí..."></textarea>
      <div class="stats-bar" id="statsOut">
        <span id="statRatio">Ratio: —</span>
        <span id="statProtected">Protecciones aplicadas: 0</span>
      </div>
    </div>

    <footer>MortyHub v2.0 &nbsp;·&nbsp; <span>Script Protection Engine</span> &nbsp;·&nbsp; Lua Obfuscator</footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  // ─── utils ───────────────────────────────────────────────────────────────

  const $ = id => document.getElementById(id);
  const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const randId = (n = 8) => {
    const c = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
    return Array.from({length: n}, () => c[rand(0, c.length - 1)]).join('');
  };

  function showToast(msg, color = '#00ffe7') {
    const t = $('toast');
    t.textContent = msg;
    t.style.borderColor = color;
    t.style.color = color;
    t.style.boxShadow = `0 0 30px ${color}55`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateIntensity(el) {
    const v = el.value;
    $('intensityVal').textContent = v;
    el.style.setProperty('--val', (v / 5 * 100) + '%');
  }

  // ─── live stats ──────────────────────────────────────────────────────────

  $('inputCode').addEventListener('input', updateInputStats);

  function updateInputStats() {
    const code = $('inputCode').value;
    const lines = code ? code.split('\n').length : 0;
    const chars = code.length;
    const funcs = (code.match(/\bfunction\b/g) || []).length;
    $('statLines').textContent = `${lines} líneas`;
    $('statChars').textContent = `${chars} caracteres`;
    $('statFuncs').textContent = `${funcs} funciones`;
    [$('statLines'), $('statChars'), $('statFuncs')].forEach(s => {
      s.classList.add('active');
      setTimeout(() => s.classList.remove('active'), 600);
    });
  }

  // ─── obfuscation engine ──────────────────────────────────────────────────

  // Lua reserved words (never rename these)
  const LUA_RESERVED = new Set([
    'and','break','do','else','elseif','end','false','for','function',
    'goto','if','in','local','nil','not','or','repeat','return','then',
    'true','until','while','print','pairs','ipairs','next','type','tostring',
    'tonumber','math','string','table','io','os','coroutine','package',
    'require','pcall','xpcall','error','assert','rawget','rawset','rawequal',
    'select','setmetatable','getmetatable','rawlen','unpack','load','loadfile',
    'dofile','collectgarbage','warn','_VERSION','_G','self'
  ]);

  // Step 1: strip comments (keep strings safe)
  function stripComments(code) {
    // Remove --[[ multiline ]]
    code = code.replace(/--\[\[[\s\S]*?\]\]/g, ' ');
    // Remove -- single line
    code = code.replace(/--[^\n]*/g, '');
    return code;
  }

  // Step 2: encode plain strings "..." and '...' to hex escape sequences
  function encodeStrings(code) {
    // replace string contents with hex-escaped version
    return code.replace(/(["'])(?:(?!\1)[^\\]|\\.)*?\1/g, match => {
      const quote = match[0];
      const inner = match.slice(1, -1);
      const hex = inner.split('').map(c => {
        const code = c.charCodeAt(0);
        return `\\${code}`;
      }).join('');
      return quote + hex + quote;
    });
  }

  // Step 3: obfuscate number literals (wrap in math expressions)
  function obfuscateNumbers(code) {
    return code.replace(/(?<![.\w])(\d+)(?![\w.])/g, n => {
      const v = parseInt(n);
      const a = rand(1, 50);
      const b = v - a;
      return b >= 0 ? `(${a}+${b})` : `(${a}-${Math.abs(b)})`;
    });
  }

  // Step 4: rename local variables and function names
  function renameVars(code, intensity) {
    // collect local var names
    const localNames = new Set();
    const reg = /\blocal\s+function\s+(\w+)|\blocal\s+([\w,\s]+)\s*=/g;
    let m;
    while ((m = reg.exec(code)) !== null) {
      const names = (m[1] || m[2]).split(',').map(s => s.trim());
      names.forEach(n => { if (n && !LUA_RESERVED.has(n)) localNames.add(n); });
    }

    // function names (non-local)
    const funcReg = /\bfunction\s+([a-zA-Z_]\w*)\s*\(/g;
    while ((m = funcReg.exec(code)) !== null) {
      if (!LUA_RESERVED.has(m[1])) localNames.add(m[1]);
    }

    // build rename map
    const renameMap = {};
    localNames.forEach(name => {
      if (!LUA_RESERVED.has(name)) {
        const len = 6 + intensity * 2;
        renameMap[name] = '_' + randId(len);
      }
    });

    // apply renames (whole word only)
    Object.entries(renameMap).forEach(([original, obf]) => {
      const safe = original.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      code = code.replace(new RegExp(`\\b${safe}\\b`, 'g'), obf);
    });

    return code;
  }

  // Step 5: insert junk / dead code
  function insertJunk(code, intensity) {
    const junkSnippets = [
      `local _j${randId(4)} = math.floor(0)`,
      `if false then local _z${randId(4)} = "unreachable" end`,
      `local _k${randId(4)} = (1==2) and 1 or 0`,
      `do local _t${randId(4)} = {} end`,
      `local _r${randId(4)} = type(nil)`,
      `-- ${randId(12)}`,
      `local _x${randId(4)} = math.max(0,0)`,
    ];

    const lines = code.split('\n');
    const result = [];
    const freq = Math.max(1, Math.floor(6 - intensity)); // more junk at higher intensity
    lines.forEach((line, i) => {
      result.push(line);
      if (i % freq === 0 && i !== 0) {
        result.push(junkSnippets[rand(0, junkSnippets.length - 1)]);
      }
    });
    return result.join('\n');
  }

  // Step 6: minify (collapse whitespace)
  function minify(code) {
    return code
      .split('\n')
      .map(l => l.trim())
      .filter(l => l.length > 0)
      .join(' ')
      .replace(/\s{2,}/g, ' ');
  }

  // Step 7: wrap in self-calling function
  function wrapCode(code) {
    const wName = '_' + randId(10);
    return `local ${wName};${wName}=function()\n${code}\nend;${wName}()`;
  }

  // Master obfuscation function
  function obfuscate() {
    const src = $('inputCode').value.trim();
    if (!src) { showToast('⚠ Pega tu script primero!', '#ff00a8'); return; }

    const intensity = parseInt($('intensity').value);
    let code = src;
    let protections = 0;

    if ($('optComments').checked) { code = stripComments(code); protections++; }
    if ($('optStrings').checked)  { code = encodeStrings(code);  protections++; }
    if ($('optNumbers').checked)  { code = obfuscateNumbers(code); protections++; }
    if ($('optVars').checked)     { code = renameVars(code, intensity); protections++; }
    if ($('optJunk').checked)     { code = insertJunk(code, intensity); protections++; }
    if ($('optHex').checked) {
      // second pass string encode after junk insertion
      code = encodeStrings(code); protections++;
    }
    if ($('optMinify').checked)   { code = minify(code); protections++; }
    if ($('optWrap').checked)     { code = wrapCode(code); protections++; }

    $('outputCode').value = code;

    // update output stats
    const ratio = src.length > 0 ? ((code.length / src.length) * 100).toFixed(0) : 0;
    $('statRatio').textContent = `Ratio: ${ratio}%`;
    $('statProtected').textContent = `Protecciones aplicadas: ${protections}`;
    [$('statRatio'), $('statProtected')].forEach(s => {
      s.classList.add('active');
      setTimeout(() => s.classList.remove('active'), 800);
    });

    showToast('✓ SCRIPT OFUSCADO EXITOSAMENTE', '#00ffe7');
  }

  function copyOutput() {
    const out = $('outputCode').value;
    if (!out) { showToast('⚠ Nada que copiar!', '#ff00a8'); return; }
    navigator.clipboard.writeText(out).then(() => showToast('⎘ COPIADO AL PORTAPAPELES'));
  }

  function clearAll() {
    $('inputCode').value = '';
    $('outputCode').value = '';
    $('statLines').textContent = '0 líneas';
    $('statChars').textContent = '0 caracteres';
    $('statFuncs').textContent = '0 funciones';
    $('statRatio').textContent = 'Ratio: —';
    $('statProtected').textContent = 'Protecciones aplicadas: 0';
    showToast('✕ LIMPIADO', '#bf00ff');
  }
  </script>
</body>
</html>
