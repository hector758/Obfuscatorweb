<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MortyHub Elite V3 | Obfuscator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(#112211 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #00ff4133;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .neon-border:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px #00ff41;
            background-color: #00ff41;
            color: #000;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Header -->
    <header class="w-full max-w-4xl flex flex-col items-center mb-8 animate-pulse">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tighter mb-2">
            MORTYHUB <span class="text-white">V3</span>
        </h1>
        <p class="text-gray-400 text-sm md:text-base uppercase tracking-[0.3em]">Virtual Machine Security System</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Input Section -->
        <section class="glass p-6 rounded-xl flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center">
                    <i class="fas fa-code mr-2 text-white"></i> SOURCE
                </h2>
                <span class="text-[10px] bg-green-900 px-2 py-1 rounded text-green-300">RAW_LUA</span>
            </div>
            <textarea 
                id="inputCode" 
                placeholder="Paste your script here..." 
                class="w-full h-80 bg-black text-green-400 p-4 rounded border border-gray-800 neon-border resize-none text-sm"
            ></textarea>
            <button 
                onclick="processObfuscation()"
                class="mt-6 w-full py-4 glass text-green-400 font-bold rounded-lg transition-all duration-300 btn-glow flex items-center justify-center uppercase tracking-widest"
            >
                <i class="fas fa-shield-alt mr-2"></i> Encrypt Script
            </button>
        </section>

        <!-- Output Section -->
        <section class="glass p-6 rounded-xl flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center">
                    <i class="fas fa-microchip mr-2 text-white"></i> VM_OUTPUT
                </h2>
                <button onclick="copyOutput()" class="text-xs bg-green-900 text-green-400 px-3 py-1 rounded hover:bg-green-400 hover:text-black transition-colors font-bold">
                    <i class="fas fa-copy mr-1"></i> COPY_CODE
                </button>
            </div>
            <textarea 
                id="outputCode" 
                readonly 
                placeholder="Protected script will appear here..." 
                class="w-full h-80 bg-black text-white p-4 rounded border border-gray-800 resize-none text-[10px] cursor-default font-mono"
            ></textarea>
            <div id="status" class="mt-6 text-center text-[10px] text-gray-500 uppercase tracking-[0.5em]">
                STATUS: IDLE_WAITING
            </div>
        </section>

    </main>

    <!-- Features -->
    <footer class="mt-12 w-full max-w-4xl grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
        <div class="glass p-4 rounded-lg border-b-2 border-green-500">
            <i class="fas fa-lock text-white text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-green-400">ANTI-DUMP</h3>
            <p class="text-[9px] text-gray-500 uppercase">Protection against stealers</p>
        </div>
        <div class="glass p-4 rounded-lg border-b-2 border-green-500">
            <i class="fas fa-project-diagram text-white text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-green-400">VM_CORE</h3>
            <p class="text-[9px] text-gray-500 uppercase">Custom Virtual Machine</p>
        </div>
        <div class="glass p-4 rounded-lg border-b-2 border-green-500">
            <i class="fas fa-user-secret text-white text-xl mb-2"></i>
            <h3 class="text-xs font-bold text-green-400">LURAPH_GEN</h3>
            <p class="text-[9px] text-gray-500 uppercase">Obscure variable naming</p>
        </div>
    </footer>

    <script>
        function processObfuscation() {
            const script = document.getElementById('inputCode').value;
            const status = document.getElementById('status');
            const output = document.getElementById('outputCode');

            if (!script.trim()) {
                status.innerHTML = "<span class='text-red-500'>ERROR: NO_SOURCE_FOUND</span>";
                return;
            }

            status.innerHTML = "<span class='text-white animate-pulse'>GENERATING_BYTECODE...</span>";
            
            setTimeout(() => {
                try {
                    const protected = obfuscateElite(script);
                    output.value = protected;
                    status.innerHTML = "<span class='text-green-400'>V3_PROTECTION_SUCCESSFUL</span>";
                } catch (e) {
                    console.error(e);
                    status.innerHTML = "<span class='text-red-500'>CRITICAL_VM_ERROR</span>";
                }
            }, 1000);
        }

        function obfuscateElite(script) {
            // Encode source to Base64
            const b64 = btoa(unescape(encodeURIComponent(script)));
            
            const r = (len) => {
                let n = "";
                const c = "lI1";
                for(let i=0; i<(len || 18); i++) n += c[Math.floor(Math.random()*c.length)];
                return n;
            };

            const decoder = r(22);
            const runner = r(20);
            const security = r(24);
            const watermark = r(15);
            const dataStr = r(12);

            return `--[[ 
    🛡️ MORTYHUB ELITE V3 OBFUSCATION
    UNREVERSIBLE VIRTUAL MACHINE PROTECTION
]]

local ${watermark} = "MortyHub_On_Top"

local function ${decoder}(data)
    local b = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
    data = string.gsub(data, '[^' .. b .. '=]', '')
    return (data:gsub('.', function(x)
        if (x == '=') then return '' end
        local r, f = '', (b:find(x) - 1)
        for i = 6, 1, -1 do
            r = r .. (f % 2 ^ i - f % 2 ^ (i - 1) > 0 and '1' or '0')
        end
        return r;
    end):gsub('%d%d%d%d%d%d%d%d', function(x)
        return string.char(tonumber(x, 2))
    end))
end

local function ${security}()
    local g = getgenv or _G
    if g and (g.saveinstance or g.save_instance or g.DecompileSource) then
        while true do end
    end
end

${security}()

local ${dataStr} = "${b64}"
local ${runner} = loadstring(${decoder}(${dataStr}))

if ${runner} then
    ${runner}()
else
    error("VM Error: Failed to execute virtualized bytecode")
end`;
        }

        function copyOutput() {
            const copyText = document.getElementById("outputCode");
            if(!copyText.value) return;
            
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            const status = document.getElementById('status');
            const oldStatus = status.innerHTML;
            status.innerHTML = "<span class='text-white'>CODE_COPIED_TO_CLIPBOARD</span>";
            setTimeout(() => status.innerHTML = oldStatus, 2000);
        }
    </script>
</body>
</html>
