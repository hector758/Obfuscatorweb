<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MortyHub Elite V3 | Obfuscator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            background-image: radial-gradient(#112211 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .glass {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00ff4133;
        }

        .neon-border:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px #00ff41;
            background-color: #00ff41;
            color: #000;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-4xl flex flex-col items-center mb-8 animate-pulse">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tighter mb-2">
            MORTYHUB <span class="text-white">V3</span>
        </h1>
        <p class="text-gray-400 text-sm uppercase tracking-[0.3em]">Advanced Obfuscation System</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Input -->
        <section class="glass p-6 rounded-xl flex flex-col">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <i class="fas fa-code mr-2 text-white"></i> SOURCE_LUA
            </h2>
            <textarea 
                id="inputCode" 
                placeholder="Paste your Roblox script here..." 
                class="w-full h-80 bg-black text-green-400 p-4 rounded border border-gray-800 neon-border resize-none text-sm"
            ></textarea>
            <button 
                onclick="processObfuscation()"
                class="mt-6 w-full py-4 glass text-green-400 font-bold rounded-lg transition-all duration-300 btn-glow uppercase"
            >
                ENCRYPT SCRIPT
            </button>
        </section>

        <!-- Output -->
        <section class="glass p-6 rounded-xl flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center">
                    <i class="fas fa-microchip mr-2 text-white"></i> PROTECTED_VM
                </h2>
                <button onclick="copyOutput()" class="text-xs bg-green-900 text-green-400 px-3 py-1 rounded hover:bg-green-400 hover:text-black font-bold">
                    COPY
                </button>
            </div>
            <textarea 
                id="outputCode" 
                readonly 
                placeholder="Protected script will appear here..." 
                class="w-full h-80 bg-black text-white p-4 rounded border border-gray-800 resize-none text-[10px] font-mono"
            ></textarea>
            <div id="status" class="mt-6 text-center text-[10px] text-gray-500 uppercase tracking-widest">
                SYSTEM: STANDBY
            </div>
        </section>

    </main>

    <script>
        function processObfuscation() {
            const script = document.getElementById('inputCode').value;
            const output = document.getElementById('outputCode');
            const status = document.getElementById('status');

            if (!script.trim()) return;

            status.innerHTML = "<span class='text-white animate-pulse'>GENERATING_VM...</span>";
            
            setTimeout(() => {
                const b64 = btoa(unescape(encodeURIComponent(script)));
                const rName = (l) => Array.from({length: l}, () => "lI1"[Math.floor(Math.random()*3)]).join('');
                
                const v1 = rName(15); // Decoder
                const v2 = rName(15); // Runner
                const v3 = rName(15); // Data
                
                const protected = `--[[ 🛡️ MORTYHUB ELITE V3 ]]
local ${v3} = "${b64}"
local function ${v1}(data)
    local b = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
    data = string.gsub(data, '[^'..b..'=]', '')
    return (data:gsub('.', function(x)
        if (x == '=') then return '' end
        local r, f = '', (b:find(x) - 1)
        for i = 6, 1, -1 do r = r .. (f % 2 ^ i - f % 2 ^ (i - 1) > 0 and '1' or '0') end
        return r
    end):gsub('%d%d%d%d%d%d%d%d', function(x)
        return string.char(tonumber(x, 2))
    end))
end

local ${v2} = loadstring(${v1}(${v3}))
if ${v2} then
    task.spawn(${v2})
else
    warn("MORTYHUB ERROR: VM_FAILED")
end`;
                
                output.value = protected;
                status.innerHTML = "<span class='text-green-400'>V3_READY_FOR_EXECUTION</span>";
            }, 500);
        }

        function copyOutput() {
            const out = document.getElementById("outputCode");
            out.select();
            document.execCommand("copy");
            document.getElementById('status').innerHTML = "<span class='text-white'>COPIED_TO_CLIPBOARD</span>";
        }
    </script>
</body>
</html>
